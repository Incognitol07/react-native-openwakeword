name: Build Android

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-build.yml'
      - 'example/android/**'
      - 'example/App.tsx'
      - 'cpp/**'
      - 'android/**'
      - 'package-lock.json'
      - 'nitro.json'
  pull_request:
    paths:
      - '.github/workflows/android-build.yml'
      - 'example/android/**'
      - 'example/App.tsx'
      - 'cpp/**'
      - 'android/**'
      - 'package-lock.json'
      - 'nitro.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Example App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (npm)
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Run Gradle build
        working-directory: example/android
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: Stop Gradle daemon
        working-directory: example/android
        run: ./gradlew --stop
